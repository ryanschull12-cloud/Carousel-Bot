name: Evening Instagram Post

# Posts carousel 2 using content already generated and committed by the
# morning "Daily Carousels" workflow — no new content is generated here,
# this just spaces the second post out by ~12 hours from the first.

on:
  schedule:
    # 8:30pm Irish time = 19:30 UTC during summer/BST (12 hours after the
    # 7:30 UTC morning run). Shift to "30 20 * * *" once winter time starts,
    # same as the morning workflow's note.
    - cron: "30 19 * * *"
  workflow_dispatch: {}

jobs:
  post-second-carousel:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Post carousel 2 to Instagram
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_BUSINESS_ACCOUNT_ID: ${{ secrets.IG_BUSINESS_ACCOUNT_ID }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
        run: python instagram_post.py --only-index 2
