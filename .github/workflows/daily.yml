name: Daily Carousels

on:
  schedule:
    # 7:00 AM Ireland time = 06:00 UTC (05:00 UTC during Irish summer time —
    # GitHub cron always runs in UTC, so adjust by 1 hour around March/October
    # if exact timing matters to you)
    - cron: "0 6 * * *"
  workflow_dispatch: {}   # lets you trigger it manually to test

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run carousel generator
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
        run: python runner.py
