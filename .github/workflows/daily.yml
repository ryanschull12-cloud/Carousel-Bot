name: Daily Carousels

on:
  schedule:
    # 8:30am Irish time. Ireland is UTC+1 during summer (BST/IST) and UTC+0
    # in winter, so this cron (7:30 UTC) is correct for summer — shift to
    # "30 8 * * *" (8:30 UTC) once winter time starts (late October) if you
    # want it to stay pinned to 8:30 Irish time year-round.
    - cron: "30 7 * * *"
  workflow_dispatch: {}   # lets you trigger it manually to test

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run carousel generator
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
        run: python runner.py
