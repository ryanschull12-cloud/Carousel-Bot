name: Midday Instagram Post

# Posts carousel 3 using content already generated and committed by the
# morning "Daily Carousels" workflow — no new content is generated here.
# Together with daily.yml (carousel 1, ~8:30am) and evening-post.yml
# (carousel 2, ~8pm), this spreads all 3 auto-posts across the day
# instead of firing them all at once.

on:
  schedule:
    # Fires at both 12:30 UTC and 13:30 UTC — same auto BST/GMT handling
    # as daily.yml and evening-post.yml, so this never needs manual
    # seasonal edits either.
    - cron: "30 12 * * *"
    - cron: "30 13 * * *"
  workflow_dispatch: {}

permissions:
  contents: write   # needed so this workflow can commit posted_log.json

jobs:
  post-third-carousel:
    runs-on: ubuntu-latest
    steps:
      - name: Check schedule window (handles Irish BST/GMT automatically)
        id: check_time
        run: |
          python3 - <<'EOF'
          import os
          from datetime import datetime
          from zoneinfo import ZoneInfo
          event_name = os.environ.get("GITHUB_EVENT_NAME", "")
          now = datetime.now(ZoneInfo("Europe/Dublin"))
          should_run = "true" if (event_name == "workflow_dispatch" or now.hour == 13) else "false"
          print(f"Irish local time right now: {now.isoformat()} (trigger: {event_name}) -> should_run={should_run}")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"should_run={should_run}\n")
          EOF

      - name: Check out repo
        if: steps.check_time.outputs.should_run == 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.check_time.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        if: steps.check_time.outputs.should_run == 'true'
        run: pip install -r requirements.txt

      - name: Post carousel 3 to Instagram
        if: steps.check_time.outputs.should_run == 'true' && vars.IG_POSTING_PAUSED != 'true'
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_BUSINESS_ACCOUNT_ID: ${{ secrets.IG_BUSINESS_ACCOUNT_ID }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
        run: python instagram_post.py --only-index 3

      - name: Commit posting log
        if: steps.check_time.outputs.should_run == 'true' && vars.IG_POSTING_PAUSED != 'true'
        run: |
          git config user.name "carousel-bot"
          git config user.email "actions@github.com"
          git add posted_log.json 2>/dev/null || true
          git commit -m "Log Instagram post $(date +'%Y-%m-%d %H:%M')" || echo "Nothing to commit"
          git push

      - name: Note that Instagram posting is paused
        if: steps.check_time.outputs.should_run == 'true' && vars.IG_POSTING_PAUSED == 'true'
        run: echo "IG_POSTING_PAUSED is set to true in repo variables — skipping this scheduled post."
