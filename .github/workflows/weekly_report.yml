name: Weekly Self-Review Report

on:
  schedule:
    - cron: "0 8 * * 1"   # Monday, ~8am UTC (roughly 8-9am Irish depending on the season)
  workflow_dispatch: {}   # lets you trigger it manually to see a report right now

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send weekly self-review email
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
        run: python performance_report.py
