name: Weekly Self-Review Report

on:
  schedule:
    - cron: "0 8 * * 1"   # Monday, ~8am UTC (roughly 8-9am Irish depending on the season)
  workflow_dispatch: {}   # lets you trigger it manually to see a report / update right now

permissions:
  contents: write   # needed so this workflow can commit learned_patterns.txt

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send weekly self-review email
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
        run: python performance_report.py

      - name: Claude self-improvement pass
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
        run: python self_improve.py

      - name: Commit updated learned patterns
        run: |
          git config user.name "carousel-bot"
          git config user.email "actions@github.com"
          git add learned_patterns.txt
          git commit -m "Update learned_patterns.txt from weekly self-improvement pass" || echo "Nothing to commit"
          git push
